<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coding Mentor Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 600px;
        }

        .chat-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .clear-btn {
            background: #ff6b6b;
        }

        .clear-btn:hover {
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .loading {
            text-align: center;
            padding: 10px;
            color: #999;
            font-style: italic;
        }

        .spinner {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: spin 1s infinite;
            margin: 0 4px;
        }

        @keyframes spin {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .sidebar {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-section h3 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .insight-item {
            background: #f9f9f9;
            padding: 10px;
            border-left: 3px solid #667eea;
            border-radius: 4px;
            font-size: 13px;
            line-height: 1.4;
        }

        .insight-item:empty::before {
            content: "No insights yet. Keep chatting!";
            color: #999;
            font-style: italic;
        }

        .stats {
            background: #f0f4ff;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
        }

        .stats-label {
            color: #667eea;
            font-weight: 600;
        }

        .stats-value {
            color: #333;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .sidebar {
                order: 2;
            }

            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-box">
            <div class="chat-header">
                <h1>💬 AI Coding Mentor</h1>
                <p>Your intelligent programming tutor with memory</p>
            </div>
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ask me anything about coding..." autofocus>
                <button onclick="sendMessage()">Send</button>
                <button class="clear-btn" onclick="clearChat()">Clear</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-section">
                <h3>📊 Chat Statistics</h3>
                <div class="stats">
                    <div class="stats-item">
                        <span class="stats-label">Messages:</span>
                        <span class="stats-value" id="msgCount">0</span>
                    </div>
                    <div class="stats-item">
                        <span class="stats-label">Insights:</span>
                        <span class="stats-value" id="insightCount">0</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>🧠 Learned Insights</h3>
                <div id="insights"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5001';
        let messageCount = 0;

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();

            if (!message) return;

            // Add user message to UI
            addMessage('user', message);
            input.value = '';

            // Show loading indicator
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = '<div class="message-content"><div class="loading">Thinking<span class="spinner"></span><span class="spinner"></span><span class="spinner"></span></div></div>';
            document.getElementById('messages').appendChild(loadingDiv);
            scrollMessages();

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();

                if (response.ok) {
                    // Remove loading indicator
                    loadingDiv.remove();

                    // Add assistant response
                    addMessage('assistant', data.response);
                    messageCount++;

                    // Update stats
                    updateStats();
                } else {
                    loadingDiv.querySelector('.message-content').textContent = `Error: ${data.error}`;
                }
            } catch (error) {
                loadingDiv.querySelector('.message-content').textContent = 'Connection error. Make sure the backend is running on http://127.0.0.1:5001';
                console.error('Error:', error);
            }

            scrollMessages();
        }

        function addMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
            document.getElementById('messages').appendChild(msgDiv);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollMessages() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function updateStats() {
            try {
                const response = await fetch(`${API_URL}/history`);
                const data = await response.json();

                if (response.ok) {
                    const chatCount = data.chats.filter(c => c.role === 'user').length;
                    document.getElementById('msgCount').textContent = chatCount;
                    document.getElementById('insightCount').textContent = data.insights.length;

                    // Update insights display
                    const insightsDiv = document.getElementById('insights');
                    insightsDiv.innerHTML = '';
                    if (data.insights.length === 0) {
                        insightsDiv.innerHTML = '<div class="insight-item"></div>';
                    } else {
                        data.insights.forEach(insight => {
                            const item = document.createElement('div');
                            item.className = 'insight-item';
                            item.textContent = insight;
                            insightsDiv.appendChild(item);
                        });
                    }
                }
            } catch (error) {
                console.error('Error updating stats:', error);
            }
        }

        async function clearChat() {
            if (!confirm('Clear all chat history and insights? This cannot be undone.')) return;

            try {
                const response = await fetch(`${API_URL}/clear`, { method: 'POST' });
                if (response.ok) {
                    document.getElementById('messages').innerHTML = '';
                    document.getElementById('msgCount').textContent = '0';
                    document.getElementById('insightCount').textContent = '0';
                    document.getElementById('insights').innerHTML = '<div class="insight-item"></div>';
                    messageCount = 0;
                    alert('Chat history cleared!');
                }
            } catch (error) {
                alert('Error clearing chat: ' + error.message);
            }
        }

        // Send message on Enter key
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Load initial stats
        updateStats();
    </script>
</body>
</html>
